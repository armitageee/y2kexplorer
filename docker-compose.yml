# Локальный Kafka (KRaft, без Zookeeper) для проверки y2kexplorer.
#
#   docker compose up -d
#   docker compose logs -f kafka-init   # дождаться "done"
#   cargo run --release
#
# Брокер с хоста: localhost:9092 (см. config.example.toml)
# Kafka UI:       http://localhost:8080

services:
  kafka:
    image: apache/kafka:3.9.0
    hostname: kafka
    container_name: y2k-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # EXTERNAL — с хоста (y2k); INTERNAL — из docker-сети (kafka-init)
      KAFKA_LISTENERS: EXTERNAL://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 25s

  kafka-init:
    image: apache/kafka:3.9.0
    container_name: y2k-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
    volumes:
      - ./docker/init-kafka.sh:/init-kafka.sh:ro
      - ./docker/sample-messages:/sample-messages:ro
    entrypoint: ["/bin/bash", "/init-kafka.sh"]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: y2k-kafka-ui
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
