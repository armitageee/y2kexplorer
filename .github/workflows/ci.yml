# CI: fmt, clippy, tests, multi-platform build (y2k + y2k-probe).
name: CI

on:
  # push — только после мержа в основные ветки; feat/* проверяем через pull_request.
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install system dependencies (librdkafka)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake pkg-config libssl-dev libsasl2-dev zlib1g-dev \
            libzstd-dev liblz4-dev libcurl4-openssl-dev
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy-linux-u2204
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies (librdkafka)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake pkg-config libssl-dev libsasl2-dev zlib1g-dev \
            libzstd-dev liblz4-dev libcurl4-openssl-dev
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-linux-u2204
      # Интеграционный тест Kafka (#[ignore]) запускать в CI не будем — нужен docker-compose кластер.
      - run: cargo test --workspace --all-features --no-run
      - run: cargo test --workspace --all-features -- --skip fetch_messages_from_local_orders

  build:
    name: build (${{ matrix.name }})
    needs: [fmt, clippy]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            # ubuntu-22.04 для совместимости релизных артефактов: glibc 2.35,
            # libssl3, libsasl2-2 покрывают Ubuntu 22.04+, Debian 12+, RHEL 9+.
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            features: --all-features
            deps: linux
          # linux-aarch64: для cross нужен sysroot c libcurl/libssl/libsasl2.
          # Самый надёжный способ — отдельный workflow на ARM-runner или cross-rs.
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            features: --all-features
            deps: macos
          # Windows исключён: librdkafka + Cyrus SASL на MSVC требуют vendored
          # сборки sasl2-sys, что хрупко; без Kerberos смысл TUI для CRPT теряется.
          # Windows-пользователи могут запускать через WSL/Docker.
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: matrix.deps == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake pkg-config libssl-dev libsasl2-dev zlib1g-dev \
            libzstd-dev liblz4-dev libcurl4-openssl-dev

      - name: Install dependencies (macOS)
        if: matrix.deps == 'macos'
        run: |
          brew install cmake pkg-config openssl@3 cyrus-sasl krb5
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig:$(brew --prefix cyrus-sasl)/lib/pkgconfig:$(brew --prefix krb5)/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=$(brew --prefix openssl@3);$(brew --prefix cyrus-sasl);$(brew --prefix krb5)" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ matrix.target }}-u2204

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: cargo build
        run: cargo build --release --locked --bin y2k --bin y2k-probe ${{ matrix.features }} --target ${{ matrix.target }}

      - name: Archive binaries
        run: |
          TARGET="${{ matrix.target }}"
          mkdir -p dist
          cp "target/${TARGET}/release/y2k" "dist/y2k-${TARGET}"
          cp "target/${TARGET}/release/y2k-probe" "dist/y2k-probe-${TARGET}"
          chmod +x dist/*
          tar -czvf "y2kexplorer-${TARGET}.tar.gz" -C dist .

      - uses: actions/upload-artifact@v7
        with:
          name: y2kexplorer-${{ matrix.target }}
          path: y2kexplorer-*.tar.gz
          if-no-files-found: error
