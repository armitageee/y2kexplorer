# Release: сборка бинарников по тегу v* и публикация GitHub Release.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-release:
    name: release (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            features: --all-features
            deps: linux
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            features: --all-features
            deps: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: matrix.deps == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake pkg-config libssl-dev libsasl2-dev zlib1g-dev \
            libzstd-dev liblz4-dev libcurl4-openssl-dev

      - name: Install dependencies (macOS)
        if: matrix.deps == 'macos'
        run: |
          brew install cmake pkg-config openssl@3 cyrus-sasl krb5
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig:$(brew --prefix cyrus-sasl)/lib/pkgconfig:$(brew --prefix krb5)/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=$(brew --prefix openssl@3);$(brew --prefix cyrus-sasl);$(brew --prefix krb5)" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          # Бампим суффикс при изменении runner-а / системных библиотек,
          # чтобы инвалидировать stale target/ от предыдущих сборок.
          shared-key: release-${{ matrix.target }}-u2204
          cache-on-failure: false

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --bin y2k --bin y2k-probe ${{ matrix.features }} --target ${{ matrix.target }}

      - name: Bundle dynamic libs (macOS)
        if: matrix.deps == 'macos'
        run: brew install dylibbundler

      - name: Package
        run: |
          set -euxo pipefail
          TARGET="${{ matrix.target }}"
          VERSION="${GITHUB_REF_NAME#v}"
          DIR="y2kexplorer-${VERSION}-${TARGET}"
          mkdir -p "${DIR}"
          cp "target/${TARGET}/release/y2k" "${DIR}/"
          cp "target/${TARGET}/release/y2k-probe" "${DIR}/"
          cp README.md config.example.toml "${DIR}/"
          chmod +x "${DIR}/y2k" "${DIR}/y2k-probe"

          if [ "${{ matrix.deps }}" = "macos" ]; then
            mkdir -p "${DIR}/lib"
            ( cd "${DIR}" && dylibbundler -of -b \
              -x ./y2k -x ./y2k-probe \
              -d ./lib -p '@executable_path/lib/' )

            # install_name_tool инвалидирует подпись каждого dylib, а на arm64
            # macOS любой Mach-O без валидной подписи отвергается dyld
            # ("library load disallowed by system policy"). Подписываем ad-hoc
            # сами, чтобы не зависеть от того, доходит ли до этого dylibbundler.
            for f in "${DIR}"/lib/*.dylib; do
              codesign --force --sign - "$f"
            done
            codesign --force --sign - "${DIR}/y2k" "${DIR}/y2k-probe"

            echo "--- otool -L y2k ---"
            otool -L "${DIR}/y2k"
            echo "--- codesign verify ---"
            codesign --verify --verbose=2 "${DIR}/y2k"
            codesign --verify --verbose=2 "${DIR}/lib/libsasl2.3.dylib" || true
          fi

          tar -czvf "${DIR}.tar.gz" "${DIR}"

      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: y2kexplorer-*.tar.gz

  github-release:
    name: publish GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Render install notes
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          sed -e "s/__TAG__/${TAG}/g" -e "s/__VERSION__/${VERSION}/g" \
            .github/release-notes-template.md > install-notes.md
          echo "--- install-notes.md ---"
          cat install-notes.md

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          append_body: true
          body_path: install-notes.md
          files: artifacts/**/*.tar.gz
