[defaults]                                                                                                                                    ─╯[defaults]
cluster = "local"
message_limit = 100
# live-режим (f): интервал опроса новых сообщений, секунды (1–30)
live_poll_secs = 3

[clusters.local]
brokers = ["localhost:9092"]
client_id = "y2kexplorer"

[clusters.local.auth]
type = "none"

# --- SASL/PLAIN (over TLS) ---
# [clusters.staging]
# brokers = ["kafka1:9093", "kafka2:9093"]
#
# [clusters.staging.auth]
# type = "sasl_plain"
# username = "user"
# password = "secret"
# tls = true

# --- SCRAM-SHA-512 ---
# [clusters.prod.auth]
# type = "sasl_scram"
# username = "user"
# password = "secret"
# mechanism = "SCRAM-SHA-512"
# tls = true

# --- Kerberos (GSSAPI) via keytab ---
[clusters.secure]
brokers = ["kafka-b01.nk-dev01.crpt.cloud:9093"]

[clusters.secure.auth]
type = "kerberos"
keytab = "/Users/a.tolstoy/.config/y2kexplorer/keytab.bin"
principal = "nk_exporter_dev@CRPT.TECH"
service_name = "kafka"
# Брокеры CRPT на :9093 обычно SASL_PLAINTEXT + GSSAPI (как kafka-explorer), без TLS:
tls = false
# krb5_conf = "~/.config/y2kexplorer/krb5.conf"
# Если брокер на SASL_SSL — tls = true и при необходимости ssl_ca / tls_verify_hostname