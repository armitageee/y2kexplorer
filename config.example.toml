[defaults]                                                                                                                                    ─╯[defaults]
cluster = "local"
message_limit = 100
# live-режим (f): интервал опроса новых сообщений, секунды (1–30)
live_poll_secs = 3
# UI-тема: "dark" (по умолчанию) или "light".
# theme = "dark"

# Брать ли счётчик сообщений (high-low watermark) для каждого топика на главной странице.
# true (default) — точный counts column, но требует один RPC на партицию.
# false — message_count=0, но загрузка списка топиков мгновенная (только metadata).
# Полезно на кластерах с >1000 партиций или высокой broker latency.
fetch_watermarks = true
# Параллелизм опроса watermarks (1..=64). Дефолт 16 даёт ~16× speedup vs sequential.
watermark_parallelism = 16

[clusters.local]
brokers = ["localhost:9092"]
client_id = "y2kexplorer"

[clusters.local.auth]
type = "none"

# --- SASL/PLAIN (over TLS) ---
# [clusters.staging]
# brokers = ["kafka1:9093", "kafka2:9093"]
#
# [clusters.staging.auth]
# type = "sasl_plain"
# username = "user"
# password = "secret"
# tls = true

# --- SCRAM-SHA-512 ---
# [clusters.prod.auth]
# type = "sasl_scram"
# username = "user"
# password = "secret"
# mechanism = "SCRAM-SHA-512"
# tls = true

# --- Kerberos (GSSAPI) via keytab ---
[clusters.secure]
brokers = ["kafka-b01.nk-dev01.crpt.cloud:9093"]

[clusters.secure.auth]
type = "kerberos"
keytab = "/etc/security/keytabs/kafka-client.keytab"
principal = "kafka-client/host.example.com@REALM"
service_name = "kafka"
tls = true
krb5_conf = "/etc/krb5.conf"           # опционально → KRB5_CONFIG
ssl_ca = "/path/to/corporate-ca.pem"   # опционально при tls = true