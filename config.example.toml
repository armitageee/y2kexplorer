[defaults]                                                                                                                                    ─╯[defaults]
cluster = "local"
message_limit = 100
# live-режим (f): интервал опроса новых сообщений, секунды (1–30)
live_poll_secs = 3
# UI-тема: "dark" (по умолчанию) или "light".
# UI theme: midnight (default) | cream | mono | latte
# Aliases: dark → midnight, light → mono, paper → mono, slate → midnight. Cycle in TUI with T.
# theme = "midnight"

# Брать ли счётчик сообщений (high-low watermark) для каждого топика на главной странице.
# true (default) — точный counts column, но требует один RPC на партицию.
# false — message_count=0, но загрузка списка топиков мгновенная (только metadata).
# Полезно на кластерах с >1000 партиций или высокой broker latency.
fetch_watermarks = true
# Параллелизм опроса watermarks (1..=64). Дефолт 16 даёт ~16× speedup vs sequential.
watermark_parallelism = 16

# Лейблы топиков (локально, не в Kafka) — для фильтрации и группировки по сервисам.
# [topic_labels.local]
# "orders" = ["order-service", "prod"]
# "payments" = ["billing", "prod"]

[clusters.local]
brokers = ["localhost:9092"]
client_id = "y2kexplorer"

# Локальный docker compose: SASL/PLAIN + StandardAuthorizer (см. docker-compose.yml).
[clusters.local.auth]
type = "sasl_plain"
username = "admin"
password = "admin-secret"
tls = false

# Ограниченный пользователь (sample ACL: Read+Describe на orders):
# username = "app"
# password = "app-secret"

# Schema Registry (docker compose: http://localhost:8081)
[clusters.local.schema_registry]
url = "http://localhost:8081"
# username = "sr-user"
# password = "sr-secret"
# tls = false

# Kafka Connect REST (docker compose: http://localhost:8083)
[clusters.local.kafka_connect]
url = "http://localhost:8083"
# username = "connect-user"
# password = "connect-secret"
# tls = false

# --- SASL/PLAIN (over TLS) ---
# [clusters.staging]
# brokers = ["kafka1:9093", "kafka2:9093"]
#
# [clusters.staging.auth]
# type = "sasl_plain"
# username = "user"
# password = "secret"
# tls = true

# --- SCRAM-SHA-512 ---
# [clusters.prod.auth]
# type = "sasl_scram"
# username = "user"
# password = "secret"
# mechanism = "SCRAM-SHA-512"
# tls = true

# --- Kerberos (GSSAPI) via keytab ---
[clusters.secure]
brokers = ["kafka-b01.nk-dev01.crpt.cloud:9093"]

[clusters.secure.auth]
type = "kerberos"
keytab = "/etc/security/keytabs/kafka-client.keytab"
principal = "kafka-client/host.example.com@REALM"
service_name = "kafka"
tls = true
krb5_conf = "/etc/krb5.conf"           # опционально → KRB5_CONFIG
ssl_ca = "/path/to/corporate-ca.pem"   # опционально при tls = true